<script>
var R = React, RD = ReactDOM;
var useState = R.useState, useEffect = R.useEffect, useCallback = R.useCallback;
var ce = R.createElement;
var G = "#14fe17", DK = "#0a2a0a", MD = "#0d3d0d", AM = "#f0c040", DM = "#0b5e0b";
var SK = "pipboy-ren-save";
function loadSave() { try { var d = JSON.parse(localStorage.getItem(SK)); return d || {}; } catch(e) { return {}; } }
function writeSave(data) {
  var existing = loadSave();
  var merged = Object.assign({}, existing, data);
  localStorage.setItem(SK, JSON.stringify(merged));
}

// Merge baked-in checked items with localStorage (localStorage overrides baked)
function getInitialChecked() {
  var localSave = loadSave();
  var merged = Object.assign({}, BAKED_CHECKED);
  if (localSave.checkedItems) {
    Object.assign(merged, localSave.checkedItems);
  }
  return merged;
}

// === AUTO HISTORY TRACKING ===
function getToday() {
  var d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function countChecked(checkedItems) {
  var total=0, done=0;
  QUESTS_DATA_RAW.forEach(function(p){p.quests.forEach(function(q){q.details.forEach(function(d){total++;if(checkedItems[d.id])done++})});});
  return {total:total, done:done};
}
function buildSnapshot(checkedItems) {
  var c = countChecked(checkedItems);
  return {
    totalCAD: STATS_CONFIG.totalCAD,
    income: STATS_CONFIG.income,
    english: STATS_CONFIG.coreStats[0].bar,
    coding: STATS_CONFIG.coreStats[1].bar,
    questsCompleted: c.done,
    questsTotal: c.total
  };
}
function getHistory() {
  var localSave = loadSave();
  var localHistory = localSave.history || [];
  // Merge: baked-in first, then local (deduplicate by date+event)
  var seen = {};
  var merged = [];
  HISTORY_RAW.forEach(function(h) { var k=h.date+"|"+h.event; if(!seen[k]){seen[k]=true; merged.push(h);} });
  localHistory.forEach(function(h) { var k=h.date+"|"+h.event; if(!seen[k]){seen[k]=true; merged.push(h);} });
  // Sort by date descending (newest first)
  merged.sort(function(a,b){ return b.date.localeCompare(a.date); });
  return merged;
}
function recordAutoSnapshot(checkedItems) {
  var today = getToday();
  var localSave = loadSave();
  var localHistory = localSave.history || [];
  var snap = buildSnapshot(checkedItems);
  // Find existing auto-entry for today
  var autoKey = today+"|AUTO SNAPSHOT";
  var found = false;
  localHistory = localHistory.map(function(h) {
    if (h.date === today && h.event.indexOf("AUTO") !== -1) {
      found = true;
      return {date: today, event: "AUTO SNAPSHOT — " + snap.questsCompleted + "/" + snap.questsTotal + " quests", snapshot: snap, auto: true};
    }
    return h;
  });
  if (!found) {
    localHistory.push({date: today, event: "AUTO SNAPSHOT — " + snap.questsCompleted + "/" + snap.questsTotal + " quests", snapshot: snap, auto: true});
  }
  writeSave({history: localHistory});
}

var scanline = { position:"fixed",top:0,left:0,right:0,bottom:0,background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px)",pointerEvents:"none",zIndex:9999 };
var tabs = ["STAT","QUEST","DATA"];
var VISA = new Date(STATS_CONFIG.visaExpiry + "T00:00:00");

function getCD() {
  var now = new Date(), diff = VISA - now;
  if (diff <= 0) return {days:0,hours:0,mins:0,secs:0};
  return {days:Math.floor(diff/864e5),hours:Math.floor(diff%864e5/36e5),mins:Math.floor(diff%36e5/6e4),secs:Math.floor(diff%6e4/1e3)};
}
function survMonths() { return (STATS_CONFIG.totalCAD / STATS_CONFIG.monthlyBurn).toFixed(1); }

// Transform raw quest data
var QUESTS_DATA = QUESTS_DATA_RAW.map(function(p) {
  return {name: p.phase, color: p.color, quests: p.quests};
});

var STATS = {
  title: "S.P.E.C.I.A.L. \u2014 \u4eba\u751f\u30b9\u30c6\u30fc\u30bf\u30b9",
  subtitle: "VAULT-BOY REN \u2014 LEVEL " + STATS_CONFIG.level,
  sections: [
    { name: "\ud83d\udcca ASSET OVERVIEW", items: STATS_CONFIG.assets },
    { name: "\ud83d\udc80 BURN RATE", items: [
      { label: "MONTHLY EXPENSE", value: "$" + STATS_CONFIG.monthlyBurn + "/mo", bar: 100 },
      { label: "SURVIVAL TIME", value: "dynamic", bar: 57, highlight: true, dynamic: "survival" },
      { label: "VISA EXPIRES", value: "NOV 6, 2026", bar: 0 },
      { label: "INCOME", value: STATS_CONFIG.income > 0 ? ("$" + STATS_CONFIG.income + "/mo") : "$0 \u2014 CRITICAL", bar: 0, danger: STATS_CONFIG.income === 0 }
    ] },
    { name: "\u26a1 CORE STATS", items: STATS_CONFIG.coreStats }
  ]
};

function BarMeter(p) {
  var blocks=20, filled=Math.round(p.value/100*blocks);
  var c = p.danger ? "#ff3030" : p.highlight ? AM : G;
  return ce("div",{style:{display:"flex",gap:1,alignItems:"center"}},
    Array.from({length:blocks}).map(function(_,i){
      return ce("div",{key:i,style:{width:8,height:12,background:i<filled?c:G+"15",boxShadow:i<filled?"0 0 4px "+c+"40":"none",transition:"all 0.3s ease"}});
    }),
    ce("span",{style:{marginLeft:6,fontSize:11,color:c+"cc"}},p.value+"%")
  );
}

function CountdownWidget() {
  var s = useState(getCD()), cd = s[0], setCd = s[1];
  useEffect(function(){ var t=setInterval(function(){setCd(getCD())},1000); return function(){clearInterval(t)}; },[]);
  var urgent = cd.days < 180;
  var c = cd.days < 90 ? "#ff3030" : cd.days < 180 ? AM : G;
  return ce("div",{style:{border:"1px solid "+c+"60",background:c+"08",padding:"12px 16px",marginBottom:20,textAlign:"center"}},
    ce("div",{style:{fontSize:11,color:c+"90",letterSpacing:2,marginBottom:6}},"\u23f3 VISA COUNTDOWN \u2014 NOV 6, 2026"),
    ce("div",{style:{fontSize:28,fontWeight:"bold",color:c,fontFamily:"'Share Tech Mono',monospace",textShadow:"0 0 10px "+c+"60",animation:urgent?"pulseRed 2s infinite":"glow 3s ease-in-out infinite"}},
      cd.days+"d "+String(cd.hours).padStart(2,"0")+"h "+String(cd.mins).padStart(2,"0")+"m "+String(cd.secs).padStart(2,"0")+"s"),
    ce("div",{style:{fontSize:11,color:c+"70",marginTop:4}},"SURVIVAL: ~"+survMonths()+" months @ $"+STATS_CONFIG.income+" income")
  );
}

function StatSection(p) {
  var section = p.section, cd = getCD();
  return ce("div",{style:{marginBottom:24}},
    ce("div",{style:{fontSize:13,fontWeight:"bold",color:AM,borderBottom:"1px solid "+DM,paddingBottom:4,marginBottom:10,letterSpacing:2}},section.name),
    section.items.map(function(item,i){
      return ce("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",animation:"slideIn 0.3s ease "+i*0.05+"s both"}},
        ce("div",{style:{flex:1,fontSize:12,color:item.danger?"#ff5050":G+"cc"}},item.label),
        ce("div",{style:{flex:1,fontSize:12,textAlign:"right",color:item.danger?"#ff3030":item.highlight?AM:G,fontWeight:item.highlight||item.danger?"bold":"normal",marginRight:12}},
          item.dynamic==="survival"?"~"+survMonths()+" months ("+cd.days+" days left)":item.value),
        ce("div",{style:{flex:1}},item.bar>0?ce(BarMeter,{value:item.bar,highlight:item.highlight,danger:item.danger}):
          ce("span",{style:{fontSize:11,color:item.danger?"#ff3030":G+"50"}},item.danger?"\u2593\u2593 CRITICAL \u2593\u2593":"\u2014"))
      );
    })
  );
}

function QuestCheckbox(p) {
  return ce("div",{onClick:function(e){e.stopPropagation();p.onChange(!p.checked)},style:{width:18,height:18,minWidth:18,border:"2px solid "+(p.checked?p.color:p.color+"60"),background:p.checked?p.color+"30":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.2s ease",animation:p.checked?"checkPop 0.3s ease":"none"}},
    p.checked&&ce("span",{style:{color:p.color,fontSize:13,fontWeight:"bold"}},"\u2713")
  );
}

function QuestCard(p) {
  var quest=p.quest,color=p.color,delay=p.delay,checkedItems=p.checkedItems,onToggle=p.onToggle;
  var s=useState(false),open=s[0],setOpen=s[1];
  var totalItems=quest.details.length;
  var doneItems=quest.details.filter(function(d){return checkedItems[d.id]}).length;
  var allDone=doneItems===totalItems;
  var progress=totalItems>0?Math.round(doneItems/totalItems*100):0;
  return ce("div",{style:{border:"1px solid "+(allDone?G+"80":color+"40"),background:allDone?G+"10":open?color+"08":"transparent",padding:"10px 14px",marginBottom:8,animation:"slideIn 0.4s ease "+delay+"s both",transition:"all 0.2s ease",opacity:allDone?0.7:1}},
    ce("div",{onClick:function(){setOpen(!open)},style:{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}},
      ce("div",{style:{display:"flex",alignItems:"center",gap:8,flex:1}},
        ce("span",{style:{fontSize:13,color:allDone?G:color,fontWeight:"bold"}},allDone?"\u2705":open?"\u25bc":"\u25b6"," ",quest.title)),
      ce("div",{style:{display:"flex",alignItems:"center",gap:10}},
        ce("div",{style:{fontSize:11,color:color+"90"}},doneItems+"/"+totalItems),
        ce("div",{style:{width:50,height:6,background:color+"20",position:"relative",overflow:"hidden"}},
          ce("div",{style:{width:progress+"%",height:"100%",background:allDone?G:color,transition:"width 0.3s ease"}})),
        ce("div",{style:{fontSize:11,color:color+"90"}},"\u23f1 "+quest.time))),
    open&&ce("div",{style:{marginTop:8,paddingLeft:8}},
      quest.details.map(function(d){
        return ce("div",{key:d.id,style:{fontSize:12,color:checkedItems[d.id]?G+"60":G+"bb",padding:"4px 0",display:"flex",alignItems:"center",gap:8,textDecoration:checkedItems[d.id]?"line-through":"none"}},
          ce(QuestCheckbox,{checked:!!checkedItems[d.id],color:color,onChange:function(val){onToggle(d.id,val)}}),d.text);
      }),
      quest.reward&&ce("div",{style:{marginTop:8,fontSize:11,color:allDone?G:AM,borderTop:"1px dashed "+DM,paddingTop:6}},
        allDone?"\ud83c\udfc6 QUEST COMPLETE!":"\ud83c\udfc6 REWARD: "+quest.reward))
  );
}

function QuestProgress(p) {
  var total=0,done=0;
  QUESTS_DATA.forEach(function(phase){phase.quests.forEach(function(q){q.details.forEach(function(d){total++;if(p.checkedItems[d.id])done++})});});
  var pct=total>0?Math.round(done/total*100):0;
  return ce("div",{style:{border:"1px solid "+G+"30",padding:"10px 16px",marginBottom:20,display:"flex",alignItems:"center",gap:14}},
    ce("div",{style:{fontSize:12,color:AM,whiteSpace:"nowrap"}},"OVERALL PROGRESS"),
    ce("div",{style:{flex:1,height:10,background:G+"15",position:"relative"}},
      ce("div",{style:{width:pct+"%",height:"100%",background:"linear-gradient(90deg,"+G+","+AM+")",transition:"width 0.5s ease",boxShadow:"0 0 8px "+G+"40"}})),
    ce("div",{style:{fontSize:14,color:G,fontWeight:"bold",minWidth:60,textAlign:"right"}},done+"/"+total+" ("+pct+"%)")
  );
}

function DataEntry(p) {
  var s=useState(false),open=s[0],setOpen=s[1];
  return ce("div",{onClick:function(){setOpen(!open)},style:{border:"1px solid "+G+"30",background:open?G+"08":"transparent",padding:"10px 14px",marginBottom:8,cursor:"pointer",animation:"slideIn 0.4s ease "+p.delay+"s both"}},
    ce("div",{style:{fontSize:13,color:G,fontWeight:"bold"}},open?"\u25bc":"\u25b6"," ",p.entry.name),
    open&&ce("pre",{style:{marginTop:8,fontSize:12,color:G+"bb",whiteSpace:"pre-wrap",lineHeight:1.6,fontFamily:"'Share Tech Mono',monospace",paddingLeft:8,borderLeft:"2px solid "+DM}},p.entry.content)
  );
}

function HistoryEntry(p) {
  var h = p.entry;
  return ce("div",{style:{border:"1px solid "+AM+"30",background:AM+"08",padding:"10px 14px",marginBottom:8}},
    ce("div",{style:{fontSize:13,color:AM,fontWeight:"bold"}},
      "\ud83d\udcc5 "+h.date+" \u2014 "+h.event),
    h.snapshot&&ce("pre",{style:{marginTop:8,fontSize:12,color:AM+"bb",whiteSpace:"pre-wrap",lineHeight:1.6,fontFamily:"'Share Tech Mono',monospace",paddingLeft:8,borderLeft:"2px solid "+AM+"40"}},
      "TOTAL CAPS: $"+h.snapshot.totalCAD+" CAD\n"+
      "INCOME: $"+h.snapshot.income+"/mo\n"+
      "ENGLISH: "+h.snapshot.english+"%\n"+
      "CODING: "+h.snapshot.coding+"%\n"+
      "QUESTS: "+h.snapshot.questsCompleted+(h.snapshot.questsTotal?"/"+h.snapshot.questsTotal:"")+" completed")
  );
}

function HistorySection(p) {
  var allHistory = getHistory();
  if (allHistory.length === 0) return null;
  return ce("div",{style:{marginBottom:16}},
    ce("div",{style:{fontSize:13,fontWeight:"bold",color:AM,borderBottom:"1px solid "+DM,paddingBottom:4,marginBottom:10,letterSpacing:2}},"\ud83d\udcdc UPDATE HISTORY (" + allHistory.length + ")"),
    allHistory.map(function(h,i){return ce(HistoryEntry,{key:h.date+"-"+i,entry:h})}));
}

function LiveCountdownEntry() {
  var s=useState(getCD()),cd=s[0],setCd=s[1];
  useEffect(function(){var t=setInterval(function(){setCd(getCD())},1000);return function(){clearInterval(t)}},[]);
  var c=cd.days<90?"#ff3030":cd.days<180?AM:G;
  return ce("div",{style:{border:"1px solid "+c+"30",background:c+"08",padding:"10px 14px",marginBottom:8}},
    ce("div",{style:{fontSize:13,color:c,fontWeight:"bold"}},"\u23f3 LIVE COUNTDOWN"),
    ce("pre",{style:{marginTop:8,fontSize:12,color:c+"cc",whiteSpace:"pre-wrap",lineHeight:1.8,fontFamily:"'Share Tech Mono',monospace",paddingLeft:8,borderLeft:"2px solid "+c+"40"}},
      "TODAY: "+new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})+"\n"+
      "VISA EXPIRY: November 6, 2026\n"+
      "DAYS REMAINING: "+cd.days+" days "+cd.hours+"h "+cd.mins+"m "+cd.secs+"s\n"+
      "MONTHLY BURN: $"+STATS_CONFIG.monthlyBurn+" CAD\n"+
      "CAPS REMAINING: ~$"+STATS_CONFIG.totalCAD+" CAD\n"+
      "SURVIVAL: ~"+survMonths()+" months\n"+
      (STATS_CONFIG.income===0?"\u26a0\ufe0f WARNING: INCOME = $0. IMMEDIATE ACTION REQUIRED.":"\u2705 INCOME: $"+STATS_CONFIG.income+"/mo"))
  );
}

function PipBoyRoadmap() {
  var s1=useState(0),activeTab=s1[0],setActiveTab=s1[1];
  var s2=useState(false),booted=s2[0],setBooted=s2[1];
  var s3=useState(""),bootText=s3[0],setBootText=s3[1];
  var s4=useState(getInitialChecked),checkedItems=s4[0],setCheckedItems=s4[1];

  var handleToggle=useCallback(function(id,val){
    setCheckedItems(function(prev){
      var next=Object.assign({},prev);
      next[id]=val;
      writeSave({checkedItems:next});
      // Auto-record daily snapshot
      recordAutoSnapshot(next);
      return next;
    });
  },[]);

  var bootSeq=["ROBCO INDUSTRIES (TM) TERMLINK PROTOCOL","LOADING VAULT-TEC PERSONAL SYSTEM...","USER: REN KAWASAKI \u2014 VAULT VICTORIA","STATUS: OPERATIONAL","MAMBA MENTALITY: ACTIVATED","","> INITIALIZING PIP-BOY 3000..."];
  useEffect(function(){
    var i=0,text="";
    var iv=setInterval(function(){
      if(i<bootSeq.length){text+=bootSeq[i]+"\n";setBootText(text);i++}
      else{clearInterval(iv);setTimeout(function(){setBooted(true)},600)}
    },350);
    return function(){clearInterval(iv)};
  },[]);

  if(!booted){
    return ce("div",{style:{minHeight:"100vh",background:"#000",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Share Tech Mono',monospace"}},
      ce("div",{style:scanline}),
      ce("pre",{style:{color:G,fontSize:14,textShadow:"0 0 8px "+G,animation:"flicker 4s infinite",lineHeight:1.8,padding:40}},
        bootText,ce("span",{style:{animation:"blink 1s infinite"}},"\u2588")));
  }

  return ce("div",{style:{minHeight:"100vh",background:"radial-gradient(ellipse at center,"+DK+" 0%,#000 100%)",fontFamily:"'Share Tech Mono',monospace",color:G,animation:"boot 0.5s ease"}},
    ce("div",{style:scanline}),
    ce("div",{style:{padding:"20px 24px 0",borderBottom:"1px solid "+DM}},
      ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        ce("div",null,
          ce("div",{style:{fontSize:20,fontWeight:"bold",textShadow:"0 0 10px "+G,animation:"glow 3s ease-in-out infinite",letterSpacing:3}},"PIP-BOY 3000"),
          ce("div",{style:{fontSize:11,color:G+"70",marginTop:2,letterSpacing:1}},"ROBCO INDUSTRIES (TM) \u2014 VAULT-TEC APPROVED")),
        ce("div",{style:{textAlign:"right"}},
          ce("div",{style:{fontSize:12,color:AM}},"REN KAWASAKI \u2014 LV."+STATS_CONFIG.level),
          ce("div",{style:{fontSize:10,color:G+"60"}},STATS_CONFIG.location+" \u2014 "+new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})))),
      ce("div",{style:{display:"flex",gap:0}},
        tabs.map(function(tab,i){
          return ce("button",{key:tab,onClick:function(){setActiveTab(i)},style:{flex:1,padding:"10px 0",background:activeTab===i?G+"15":"transparent",border:"1px solid "+(activeTab===i?G:DM),borderBottom:activeTab===i?"2px solid "+G:"1px solid "+DM,color:activeTab===i?G:G+"50",fontFamily:"'Share Tech Mono',monospace",fontSize:14,fontWeight:"bold",cursor:"pointer",letterSpacing:4,transition:"all 0.2s ease",textShadow:activeTab===i?"0 0 6px "+G:"none"}},tab);
        }))),
    ce("div",{style:{padding:"20px 24px",maxWidth:800,margin:"0 auto",maxHeight:"calc(100vh - 120px)",overflowY:"auto",paddingBottom:60}},
      activeTab===0&&ce("div",null,
        ce("div",{style:{fontSize:16,fontWeight:"bold",letterSpacing:2,marginBottom:4}},STATS.title),
        ce("div",{style:{fontSize:11,color:G+"60",marginBottom:20,letterSpacing:1}},STATS.subtitle),
        ce(CountdownWidget),
        STATS.sections.map(function(s,i){return ce(StatSection,{key:i,section:s})})),
      activeTab===1&&ce("div",null,
        ce("div",{style:{fontSize:16,fontWeight:"bold",letterSpacing:2,marginBottom:4}},"ACTIVE QUESTS"),
        ce("div",{style:{fontSize:11,color:G+"60",marginBottom:20,letterSpacing:1}},"MISSION LOG \u2014 VICTORIA, BC"),
        ce(QuestProgress,{checkedItems:checkedItems}),
        QUESTS_DATA.map(function(phase,pi){
          return ce("div",{key:pi,style:{marginBottom:24}},
            ce("div",{style:{fontSize:13,fontWeight:"bold",color:phase.color,borderBottom:"1px solid "+phase.color+"40",paddingBottom:4,marginBottom:10,letterSpacing:2}},phase.name),
            phase.quests.map(function(q,qi){
              return ce(QuestCard,{key:q.id,quest:q,color:phase.color,delay:qi*0.08,checkedItems:checkedItems,onToggle:handleToggle});
            }));
        })),
      activeTab===2&&ce("div",null,
        ce("div",{style:{fontSize:16,fontWeight:"bold",letterSpacing:2,marginBottom:4}},"INTEL DATABASE"),
        ce("div",{style:{fontSize:11,color:G+"60",marginBottom:20,letterSpacing:1}},"CLASSIFIED \u2014 EYES ONLY"),
        ce(LiveCountdownEntry),
        ce(HistorySection,{checkedItems:checkedItems}),
        DATA_ENTRIES_RAW.map(function(e,i){return ce(DataEntry,{key:i,entry:e,delay:i*0.08})}))
    ),
    ce("div",{style:{position:"fixed",bottom:0,left:0,right:0,padding:"6px 24px",background:"linear-gradient(transparent,"+DK+")",borderTop:"1px solid "+DM,display:"flex",justifyContent:"space-between",fontSize:10,color:G+"50",letterSpacing:1,zIndex:100}},
      ce("span",null,"VAULT-TEC PERSONAL INFORMATION PROCESSOR"),
      ce("span",null,"HP: \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 100% \u2014 MAMBA MENTALITY: ON"))
  );
}

RD.createRoot(document.getElementById("root")).render(ce(PipBoyRoadmap));
</script>
</body>
